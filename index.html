<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- EDITAR: título y descripción para SEO -->
  <title>Bendito Capricho</title>
  <meta name="description" content="Bendito Capricho — Próximamente." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Variables ─────────────────────────────────────────── */
    :root {
      --bg-dark:     #07050F;
      --bg-deeper:   #030208;
      --bg-section:  #0C0A18;
      --accent-1:    #C026D3;
      --accent-2:    #E879F9;
      --accent-rose: #F0ABFC;
      --text-light:  #F8F5FF;
      --text-muted:  rgba(248, 245, 255, 0.5);
      --font-title:  'Cormorant Garamond', Georgia, serif;
      --font-body:   'DM Sans', system-ui, sans-serif;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Animación fade-in al cargar ───────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.3s; }
    .fade-up-3 { animation-delay: 0.5s; }
    .fade-up-4 { animation-delay: 0.65s; }

    /* ─── Sección Hero ──────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
      background:
        radial-gradient(ellipse 55% 45% at 50% 38%, rgba(192, 38, 211, 0.22) 0%, transparent 65%),
        radial-gradient(ellipse 35% 30% at 20% 80%, rgba(232, 121, 249, 0.08) 0%, transparent 60%),
        var(--bg-dark);
      overflow: hidden;
    }

    /* Patrón de diamantes (inspirado en diseño Canva) */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 2 L38 20 L20 38 L2 20 Z' fill='none' stroke='rgba(232,121,249,0.06)' stroke-width='0.8'/%3E%3C/svg%3E");
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Brillo central sutil sobre el patrón */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(7,5,15,0) 40%, rgba(7,5,15,0.7) 100%);
      pointer-events: none;
    }

    .hero-ornament {
      font-family: var(--font-title);
      font-style: italic;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      letter-spacing: 0.35em;
      color: var(--accent-2);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--text-light);
      position: relative;
    }

    /* Brillo sutil detrás del título */
    .hero h1::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-2) 0%, transparent 60%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.15;
      pointer-events: none;
    }

    .hero-subtitle {
      margin-top: 1.5rem;
      font-family: var(--font-body);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.12em;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* EDITAR: separador decorativo — se puede cambiar por un SVG propio */
    .hero-divider {
      margin: 2.5rem auto 0;
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-2), transparent);
    }

    /* ─── Sección Video ──────────────────────────────────────── */
    .section-video {
      background:
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 2 L38 20 L20 38 L2 20 Z' fill='none' stroke='rgba(232,121,249,0.05)' stroke-width='0.8'/%3E%3C/svg%3E"),
        var(--bg-section);
      background-size: 40px 40px, auto;
      padding: 6rem 2rem;
    }

    .section-label {
      display: block;
      text-align: center;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 2.5rem;
    }

    .video-wrapper {
      max-width: 820px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(192, 38, 211, 0.25);
    }

    .video-ratio {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }

    .video-ratio iframe,
    .video-ratio video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Sección Waitlist ───────────────────────────────────── */
    .section-waitlist {
      padding: 7rem 2rem;
      text-align: center;
      background:
        radial-gradient(ellipse 60% 45% at 50% 100%, rgba(192, 38, 211, 0.14) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 2 L38 20 L20 38 L2 20 Z' fill='none' stroke='rgba(232,121,249,0.05)' stroke-width='0.8'/%3E%3C/svg%3E"),
        var(--bg-dark);
      background-size: auto, 40px 40px, auto;
    }

    .section-waitlist h2 {
      font-family: var(--font-title);
      font-weight: 600;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.15;
      color: var(--text-light);
      margin-bottom: 1rem;
    }

    .section-waitlist p {
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 3rem;
      line-height: 1.7;
    }

    /* Formulario */
    .waitlist-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .waitlist-form input[type="email"] {
      flex: 1 1 260px;
      padding: 0.85rem 1.25rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 8px;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .waitlist-form input[type="email"]::placeholder {
      color: var(--text-muted);
    }

    .waitlist-form input[type="email"]:focus {
      border-color: var(--accent-2);
    }

    .waitlist-form button {
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: 8px;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .waitlist-form button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .waitlist-form button:active {
      transform: translateY(0);
    }

    /* Mensaje de confirmación */
    .waitlist-confirm {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 0.6s ease forwards;
    }

    .waitlist-confirm.visible {
      display: flex;
    }

    .confirm-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .waitlist-confirm p {
      font-size: 1rem;
      color: var(--text-light);
      margin: 0;
    }

    .waitlist-confirm span {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      background: var(--bg-deeper);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .footer-brand {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-light);
    }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* EDITAR: añade aquí tus redes sociales */
    .footer-social {
      display: flex;
      gap: 1.25rem;
    }

    .footer-social a {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-social a:hover {
      color: var(--accent-2);
    }

    /* ─── Botón WhatsApp ─────────────────────────────────────── */
    .section-whatsapp {
      padding: 4rem 2rem;
      text-align: center;
      background: var(--bg-dark);
    }

    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.25rem;
      background: #25D366;
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-decoration: none;
      border-radius: 50px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(37, 211, 102, 0.25);
    }

    .btn-whatsapp:hover {
      background: #1ebe5d;
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(37, 211, 102, 0.4);
    }

    .btn-whatsapp svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .footer-inner {
        flex-direction: column;
        text-align: center;
      }

      .waitlist-form {
        flex-direction: column;
      }

      .waitlist-form input[type="email"],
      .waitlist-form button {
        width: 100%;
        flex: none;
      }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       HERO
  ══════════════════════════════════════════ -->
  <section class="hero">
    <!-- EDITAR: ornamento o categoría de marca encima del título -->
    <p class="hero-ornament fade-up fade-up-1">Una experiencia</p>

    <h1 class="fade-up fade-up-2" data-text="Bendito Capricho Store">Bendito Capricho Store</h1>

    <!-- EDITAR: subtítulo de marca — cambia o elimina este párrafo -->
    <p class="hero-subtitle fade-up fade-up-3">Próximamente</p>

    <div class="hero-divider fade-up fade-up-4"></div>
  </section>


  <!-- ══════════════════════════════════════════
       VIDEO
  ══════════════════════════════════════════ -->
  <section class="section-video">
    <!-- EDITAR: etiqueta de sección -->
    <span class="section-label">Descúbrenos</span>

    <div class="video-wrapper">
      <div class="video-ratio">

        <iframe
          src="https://www.youtube.com/embed/PKkBfjEVO1Q?autoplay=1&mute=1&rel=0&modestbranding=1&showinfo=0&iv_load_policy=3&color=white&playsinline=1"
          title="Bendito Capricho — Video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>

        <!-- ALTERNATIVA — Video local HTML5:
             Si prefieres usar un video propio en lugar del embed de YouTube:
             1. Comenta o elimina el <iframe> de arriba.
             2. Descomenta el bloque <video> de abajo y pon la ruta a tu archivo.

        <video controls poster="poster.jpg">
          <source src="video.mp4" type="video/mp4" />
          Tu navegador no soporta la etiqueta de video.
        </video>
        -->

      </div>
    </div>
  </section>


  <!-- ══════════════════════════════════════════
       BOTÓN WHATSAPP
  ══════════════════════════════════════════ -->
  <section class="section-whatsapp">
    <a class="btn-whatsapp" href="https://w.app/a6fedj" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      Contáctanos por WhatsApp
    </a>
  </section>


  <!-- ══════════════════════════════════════════
       WAITLIST / CONTACTO
  ══════════════════════════════════════════ -->
  <section class="section-waitlist">
    <!-- EDITAR: título de la sección waitlist -->
    <h2>Sé el primero en saberlo</h2>

    <!-- EDITAR: descripción breve -->
    <p>
      Algo especial está por llegar. Déjanos tu correo y te avisamos
      antes que nadie.
    </p>

    <!-- EDITAR: para conectar con Mailchimp, ConvertKit u otro servicio,
         cambia action="#" por la URL de tu endpoint y añade los campos
         hidden que requiera tu proveedor. -->
    <form class="waitlist-form" id="waitlistForm" action="#" novalidate>
      <input
        type="email"
        id="emailInput"
        name="email"
        placeholder="tu@correo.com"
        autocomplete="email"
        required
      />
      <button type="submit">Unirme</button>
    </form>

    <div class="waitlist-confirm" id="waitlistConfirm" role="status" aria-live="polite">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <p>¡Apuntado!</p>
      <span>Te avisaremos muy pronto.</span>
    </div>
  </section>


  <!-- ══════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════ -->
  <footer>
    <div class="footer-inner">
      <span class="footer-brand">Bendito Capricho</span>

      <!-- EDITAR: añade, cambia o elimina los enlaces de redes sociales -->
      <nav class="footer-social" aria-label="Redes sociales">
        <a href="#" aria-label="Instagram">Instagram</a>
        <a href="#" aria-label="TikTok">TikTok</a>
        <!-- <a href="#" aria-label="Twitter">Twitter</a> -->
      </nav>

      <p class="footer-copy">© 2026 Bendito Capricho</p>
    </div>
  </footer>


  <!-- ─── JavaScript: lógica del formulario ─────────────────── -->
  <script>
    (function () {
      var form    = document.getElementById('waitlistForm');
      var confirm = document.getElementById('waitlistConfirm');
      var input   = document.getElementById('emailInput');

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        var email = input.value.trim();
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailRegex.test(email)) {
          input.focus();
          input.setCustomValidity('Por favor, introduce un correo válido.');
          input.reportValidity();
          return;
        }

        input.setCustomValidity('');

        // EDITAR: aquí puedes hacer un fetch() a tu endpoint antes de
        // ocultar el formulario. Ejemplo:
        //
        // fetch('/api/subscribe', {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify({ email: email })
        // }).then(function() { showConfirmation(); });
        //
        // Por ahora solo mostramos la confirmación directamente:
        showConfirmation();
      });

      function showConfirmation() {
        form.style.display    = 'none';
        confirm.classList.add('visible');
      }
    })();
  </script>

</body>
</html>
