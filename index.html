<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- EDITAR: título y descripción para SEO -->
  <title>Bendito Capricho</title>
  <meta name="description" content="Bendito Capricho — Próximamente." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500&family=Poppins:wght@900&display=swap" rel="stylesheet" />

  <style>
    /* ─── Variables ─────────────────────────────────────────── */
    :root {
      --bg-dark:     #6B3AAF;
      --bg-deeper:   #4A1A7A;
      --bg-section:  transparent;
      --accent-1:    #C026D3;
      --accent-2:    #E879F9;
      --accent-rose: #F0ABFC;
      --text-light:  #FFFFFF;
      --text-muted:  rgba(255, 255, 255, 0.65);
      --font-title:  'Cormorant Garamond', Georgia, serif;
      --font-body:   'DM Sans', system-ui, sans-serif;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    /* ─── Fondo global ──────────────────────────────────────── */
    body {
      background-color: #7040B8;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.09'/%3E%3C/svg%3E"),
        radial-gradient(ellipse 55% 40% at 92% 5%,  rgba(255,160,180,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 45% 35% at 95% 95%, rgba(255,140,160,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 70% 55% at 35% 45%, rgba(45, 10, 80, 0.65) 0%, transparent 70%),
        linear-gradient(160deg, #8B4DC8 0%, #6B30A8 40%, #7840B5 70%, #8050C0 100%);
      background-repeat: repeat, no-repeat, no-repeat, no-repeat, no-repeat;
      background-size: 256px 256px, cover, cover, cover, cover;
      background-attachment: scroll;
      min-height: 100dvh;
      color: var(--text-light);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Animación fade-in al cargar ───────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.3s; }
    .fade-up-3 { animation-delay: 0.5s; }
    .fade-up-4 { animation-delay: 0.65s; }

    /* ─── Barra superior ────────────────────────────────────── */
    .topbar {
      width: 100%;
      background: rgba(45, 10, 80, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-align: center;
      padding: 0.65rem 1rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-rose);
      position: relative;
      z-index: 10;
    }

    /* ─── Cabecera compacta ─────────────────────────────────── */
    .hero {
      padding: 2.5rem 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      background: transparent;
      overflow: visible;
    }

    .hero-ornament {
      font-family: var(--font-title);
      font-style: italic;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      letter-spacing: 0.35em;
      color: var(--accent-2);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow:
        1px  1px  0   #3A0E70,
        2px  2px  0   #330D65,
        3px  3px  0   #2C0B59,
        4px  4px  0   #25094E,
        5px  5px  0   #1E0742,
        6px  6px  12px rgba(0,0,0,0.45);
      position: relative;
    }

    /* ─── Sección Video ──────────────────────────────────────── */
    .section-video {
      background: transparent;
      padding: 1.5rem 2rem 4rem;
    }

    .section-label {
      display: block;
      text-align: center;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 2.5rem;
    }

    .video-wrapper {
      max-width: 820px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(192, 38, 211, 0.25);
    }

    /* ─── Barra de progreso personalizada ───────────────────── */
    .video-progress {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      position: relative;
    }

    .video-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #9B10C0, #C026D3, #E879F9, #fff);
      background-size: 300% 100%;
      animation: shimmer 1s linear infinite;
      position: relative;
      transition: width 0.15s ease-out;
    }

    @keyframes shimmer {
      0%   { background-position: 300% center; }
      100% { background-position: -300% center; }
    }

    .video-progress-dot {
      position: absolute;
      right: -9px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 12px 4px rgba(232,121,249,1);
      transition: transform 0.15s;
    }

    .video-progress:hover .video-progress-dot {
      transform: translateY(-50%) scale(1.35);
    }

    .video-ratio {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }

    .video-ratio iframe,
    .video-ratio video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Sección Waitlist ───────────────────────────────────── */
    .section-waitlist {
      padding: 7rem 2rem;
      text-align: center;
      background: transparent;
    }

    .section-waitlist h2 {
      font-family: var(--font-title);
      font-weight: 600;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.15;
      color: var(--text-light);
      margin-bottom: 1rem;
    }

    .section-waitlist p {
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 3rem;
      line-height: 1.7;
    }

    /* Formulario */
    .waitlist-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .waitlist-form input[type="email"] {
      flex: 1 1 260px;
      padding: 0.85rem 1.25rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 8px;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .waitlist-form input[type="email"]::placeholder {
      color: var(--text-muted);
    }

    .waitlist-form input[type="email"]:focus {
      border-color: var(--accent-2);
    }

    .waitlist-form button {
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: 8px;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .waitlist-form button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .waitlist-form button:active {
      transform: translateY(0);
    }

    /* Mensaje de confirmación */
    .waitlist-confirm {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 0.6s ease forwards;
    }

    .waitlist-confirm.visible {
      display: flex;
    }

    .confirm-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .waitlist-confirm p {
      font-size: 1rem;
      color: var(--text-light);
      margin: 0;
    }

    .waitlist-confirm span {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      background: rgba(45, 10, 80, 0.5);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .footer-brand {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-light);
    }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* EDITAR: añade aquí tus redes sociales */
    .footer-social {
      display: flex;
      gap: 1.25rem;
    }

    .footer-social a {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-social a:hover {
      color: var(--accent-2);
    }

    /* ─── Sparkles ───────────────────────────────────────────── */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes sparkle-pulse {
      0%, 100% { opacity: 0.15; transform: scale(0.8) rotate(0deg); }
      50%       { opacity: 1;    transform: scale(1.2) rotate(20deg); }
    }

    .sparkle {
      position: absolute;
      fill: white;
      filter: drop-shadow(0 0 4px rgba(255,220,255,0.9));
    }

    .s1 { width: 22px; top:  8%; left:  12%; animation: sparkle-pulse 3.2s ease-in-out infinite; }
    .s2 { width: 16px; top: 22%; left:  68%; animation: sparkle-pulse 2.8s ease-in-out infinite 0.6s; }
    .s3 { width: 20px; top: 55%; left:  10%; animation: sparkle-pulse 3.6s ease-in-out infinite 1.1s; }
    .s4 { width: 14px; top: 70%; left:  55%; animation: sparkle-pulse 2.5s ease-in-out infinite 0.3s; }
    .s5 { width: 24px; top: 85%; left:  80%; animation: sparkle-pulse 3.0s ease-in-out infinite 1.5s; }

    /* ─── Overlay "toca para sonido" ────────────────────────── */
    #soundOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #soundOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 0.9; }
      70%  { transform: scale(1.35); opacity: 0;   }
      100% { transform: scale(1.35); opacity: 0;   }
    }

    .sound-pulse {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(192, 38, 211, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .sound-pulse::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(192, 38, 211, 0.5);
      animation: pulse-ring 1.8s ease-out infinite;
    }

    .sound-pulse svg {
      width: 28px;
      height: 28px;
      position: relative;
      z-index: 1;
    }

    #soundOverlay span {
      font-family: var(--font-body);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      background: rgba(7,5,15,0.55);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
    }

    /* ─── Botón WhatsApp ─────────────────────────────────────── */
    .section-whatsapp {
      padding: 4rem 2rem;
      text-align: center;
      background: transparent;
    }

    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.25rem;
      background: #25D366;
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-decoration: none;
      border-radius: 50px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(37, 211, 102, 0.25);
    }

    .btn-whatsapp:hover {
      background: #1ebe5d;
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(37, 211, 102, 0.4);
    }

    .btn-whatsapp svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ─── Responsive móvil ───────────────────────────────────── */
    @media (max-width: 600px) {

      /* Título más grande y legible en pantalla pequeña */
      .hero {
        padding: 2rem 1.25rem 1rem;
      }

      .hero h1 {
        font-size: clamp(1.9rem, 9vw, 2.8rem);
        text-shadow:
          1px 1px 0 #3A0E70,
          2px 2px 0 #2C0B59,
          3px 3px 8px rgba(0,0,0,0.4);
      }

      /* Video sin padding lateral para aprovechar toda la pantalla */
      .section-video {
        padding: 1rem 0 2.5rem;
      }

      .video-wrapper {
        border-radius: 0;
        box-shadow: none;
      }

      /* WhatsApp: botón ancho completo, más fácil de tocar */
      .section-whatsapp {
        padding: 2rem 1.25rem;
      }

      .btn-whatsapp {
        width: 100%;
        justify-content: center;
        font-size: 1.05rem;
        padding: 1.1rem 1.5rem;
      }

      /* Waitlist más compacto */
      .section-waitlist {
        padding: 3.5rem 1.25rem;
      }

      .waitlist-form {
        flex-direction: column;
      }

      .waitlist-form input[type="email"],
      .waitlist-form button {
        width: 100%;
        flex: none;
        font-size: 1rem;
        padding: 1rem 1.25rem;
      }

      /* Footer apilado */
      .footer-inner {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0.75rem;
      }

      /* Overlay sonido más grande para tocar fácil */
      .sound-pulse {
        width: 72px;
        height: 72px;
      }

      .sound-pulse svg {
        width: 32px;
        height: 32px;
      }

      #soundOverlay span {
        font-size: 0.85rem;
      }
    }
  </style>
</head>

  <script>
    // ── Video: autoplay + audio al tocar + iOS & Android ────────
    (function () {
      var video   = document.getElementById('mainVideo');
      var overlay = document.getElementById('soundOverlay');
      var bar     = document.getElementById('videoProgress');
      var fill    = document.getElementById('videoProgressFill');
      var soundOn = false;

      // ── 1. Arrancar el video mudo en cuanto sea posible ──────
      function startMuted() {
        if (video.paused) {
          video.muted = true;
          video.play().catch(function () {});
        }
      }

      // Intentar inmediatamente
      startMuted();

      // Si el DOM no estaba listo, reintentar al cargar metadata
      video.addEventListener('loadedmetadata', startMuted);

      // Fallback extra a 800ms (Android WebView a veces necesita esto)
      setTimeout(startMuted, 800);

      // ── 2. Primer toque en CUALQUIER PARTE → audio ON ───────
      //    iOS Safari y Android Chrome ambos aceptan click como
      //    gesto válido para desbloquear audio.
      function activateSound() {
        if (soundOn) return;
        soundOn = true;
        overlay.classList.add('hidden');
        video.muted = false;
        video.play().catch(function () {
          // Fallback: si el browser bloquea con audio, sigue mudo
          video.muted = true;
          video.play().catch(function () {});
        });
        document.removeEventListener('click', activateSound);
      }

      document.addEventListener('click', activateSound);

      // ── 3. Barra de progreso acelerada ───────────────────────
      function tick() {
        if (video.duration) {
          var real = video.currentTime / video.duration;
          var pct  = real > 0.97 ? 100 : Math.min(95, real * 2.8 * 100);
          fill.style.width = pct + '%';
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      // Tap en la barra → seek
      bar.addEventListener('click', function (e) {
        if (!video.duration) return;
        var rect = bar.getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width / 2.8) * video.duration;
      });
    })();

    // ── Lógica del formulario waitlist ───────────────────────────
    (function () {
      var form    = document.getElementById('waitlistForm');
      var confirm = document.getElementById('waitlistConfirm');
      var input   = document.getElementById('emailInput');

      // Validación antes de enviar — el submit real lo hace el browser
      form.addEventListener('submit', function (e) {
        var email = input.value.trim();
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          e.preventDefault();
          input.focus();
          input.setCustomValidity('Por favor, introduce un correo válido.');
          input.reportValidity();
          return;
        }
        input.setCustomValidity('');
        // Deja que el form se envíe normalmente a Formsubmit
      });

      // Al volver con ?ok=1, mostramos confirmación
      if (window.location.search.indexOf('ok=1') !== -1) {
        form.style.display = 'none';
        confirm.classList.add('visible');
        // Limpia el parámetro de la URL sin recargar
        history.replaceState(null, '', window.location.pathname);
      }
    })();
  </script>
